name: Check external links

on:
  push:
    paths:
      - 'docs/build_tags.py'
  pull_request:
    paths:
      - 'docs/build_tags.py'
  schedule:
    # Also runs weekly on Monday at 09:00 UTC to catch links that go stale over time
    - cron: '0 9 * * 1'

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check external links
        run: |
          python3 - << 'EOF'
          import sys
          import urllib.request
          import urllib.error

          # Pull EXTERNAL_LINKS out of build_tags.py by importing it
          sys.path.insert(0, "docs")
          from build_tags import EXTERNAL_LINKS

          dead = []
          ok   = []

          for link in EXTERNAL_LINKS:
              url = link["url"]
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "docs-hub-link-checker/1.0"})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      status = r.status
              except urllib.error.HTTPError as e:
                  status = e.code
              except Exception as e:
                  status = str(e)

              if str(status).startswith("2") or str(status).startswith("3"):
                  ok.append((url, status))
              else:
                  dead.append((url, link["title"], status))

          print(f"✅ {len(ok)} links ok")

          if dead:
              print(f"\n⚠️  {len(dead)} broken or unreachable links (warning only - not blocking merge):\n")
              for url, title, status in dead:
                  print(f"  [{title}]({url})  →  {status}")
              print("\nUpdate or remove these entries in docs/build_tags.py")
              # Exit 0 - this is a warning, not a hard failure
              sys.exit(0)
          else:
              print("✅ All external links reachable.")
          EOF
